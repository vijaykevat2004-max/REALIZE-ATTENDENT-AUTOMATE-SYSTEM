services:
  - type: web
    name: hrms-ai-service
    env: python
    region: oregon
    buildCommand: pip install -r services/ai-iphone/requirements.txt
    startCommand: cd services/ai-iphone && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
